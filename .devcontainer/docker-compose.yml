version: '3.8'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - cargo-cache:/usr/local/cargo/registry
      - simulation-target-cache:/workspace/apps/simulation/target
    command: sleep infinity
    environment:
      - RUST_BACKTRACE=1
    ports:
      - "8080:8080"

volumes:
  cargo-cache:
  simulation-target-cache:
