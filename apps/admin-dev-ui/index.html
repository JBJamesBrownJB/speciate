<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speciate Dev Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Speciate Dev Admin</h1>
            <p class="subtitle">Local testing control panel</p>
            <div id="status" class="status disconnected">Disconnected</div>
        </header>

        <section class="panel">
            <h2>Quick Scenarios</h2>
            <p class="help">One-click test scenarios for rapid visual testing</p>

            <div class="scenario-grid">
                <button class="scenario-btn" data-scenario="twoSeekersIntercept">
                    <span class="icon">🎯</span>
                    <span class="label">Two Seekers Intercept</span>
                    <span class="desc">Test collision avoidance during approach</span>
                </button>

                <button class="scenario-btn" data-scenario="wandererCrowd">
                    <span class="icon">👥</span>
                    <span class="label">Wanderer Crowd</span>
                    <span class="desc">15 wanderers testing personal space</span>
                </button>

                <button class="scenario-btn" data-scenario="seekerObstacles">
                    <span class="icon">🚧</span>
                    <span class="label">Seeker + Obstacles</span>
                    <span class="desc">Navigation through obstacles</span>
                </button>

                <button class="scenario-btn" data-scenario="ringOfDeath">
                    <span class="icon">⭕</span>
                    <span class="label">Ring of Death</span>
                    <span class="desc">8 creatures seeking center (stress test)</span>
                </button>
            </div>
        </section>

        <section class="panel">
            <h2>Manual Spawn</h2>
            <p class="help">Spawn individual creatures with custom parameters</p>

            <form id="manualSpawnForm" class="form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="posX">Position X (m)</label>
                        <input type="number" id="posX" value="0" step="10">
                    </div>
                    <div class="form-group">
                        <label for="posY">Position Y (m)</label>
                        <input type="number" id="posY" value="0" step="10">
                    </div>
                </div>

                <div class="form-group">
                    <label for="behavior">Behavior</label>
                    <select id="behavior">
                        <option value="seeking">Seeking</option>
                        <option value="wandering">Wandering</option>
                        <option value="catatonic">Catatonic (Obstacle)</option>
                    </select>
                </div>

                <div class="form-row" id="targetGroup">
                    <div class="form-group">
                        <label for="targetX">Target X (m)</label>
                        <input type="number" id="targetX" value="100" step="10">
                    </div>
                    <div class="form-group">
                        <label for="targetY">Target Y (m)</label>
                        <input type="number" id="targetY" value="0" step="10">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="energy">Energy (optional)</label>
                        <input type="number" id="energy" placeholder="100" step="10">
                    </div>
                    <div class="form-group">
                        <label for="maxSpeed">Max Speed (optional)</label>
                        <input type="number" id="maxSpeed" placeholder="20" step="1">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Spawn Creature</button>
            </form>
        </section>

        <section class="panel">
            <h2>Utilities</h2>
            <p class="help">Simulation controls and utilities</p>

            <div class="utility-grid">
                <button id="clearAll" class="btn-danger">
                    🗑️ Clear All Creatures
                </button>

                <div class="speed-control">
                    <label for="speedSlider">Speed: <span id="speedValue">1.0x</span></label>
                    <input type="range" id="speedSlider" min="0.25" max="5" step="0.25" value="1">
                    <div class="speed-presets">
                        <button class="speed-preset" data-speed="0.25">0.25x</button>
                        <button class="speed-preset" data-speed="0.5">0.5x</button>
                        <button class="speed-preset" data-speed="1">1x</button>
                        <button class="speed-preset" data-speed="2">2x</button>
                        <button class="speed-preset" data-speed="5">5x</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>Activity Log</h2>
            <div id="log" class="log"></div>
        </section>
    </div>

    <script type="module" src="./nats-client.js"></script>
    <script type="module" src="./scenarios.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
