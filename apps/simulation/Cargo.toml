[package]
name = "speciate"
version = "0.1.0"
edition = "2021"
authors = ["Speciate Team"]
description = "Server-authoritative AI life simulation with player-driven economy"
license = "MIT"
repository = "https://github.com/anthropics/speciate"

[dependencies]
# Bevy ECS Framework
bevy_ecs = "0.14"
bevy_app = "0.14"

# Logging
log = "0.4"
env_logger = "0.11"

# CLI & Configuration
clap = { version = "4.5", features = ["derive"] }
toml = "0.8"
serde = { version = "1.0", features = ["derive"] }
rmp-serde = "1.3"  # MessagePack serialization for binary snapshots

# Utility
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }  # Timestamp generation for snapshots
ctrlc = { version = "3.4", features = ["termination"] }  # Signal handling for graceful shutdown

# NATS Streaming
async-nats = "0.37"
tokio = { version = "1.43", features = ["rt", "sync", "time"] }
crossbeam-channel = "0.5"
serde_json = "1.0"

[dev-dependencies]
# Testing utilities
tokio = { version = "1.43", features = ["rt", "sync", "time", "macros"] }
futures = "0.3"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 0

[[bin]]
name = "speciate"
path = "src/main.rs"
