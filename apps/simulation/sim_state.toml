[metadata]
version = "1.0"
description = "Wandering behavior test - 100 wanderers with home-biased movement"
created_at = "2025-11-08T00:00:00Z"

[world]
width = 100.0
height = 100.0

[spawn]
# Number of creatures to spawn
count = 500

# Behavior type: "seeking" or "wandering"
behavior = "wandering"

# Rectangle where creatures spawn (random positions within bounds)
# For wanderers: spawn position becomes their "home" territory center
# Format: { min_x, max_x, min_y, max_y }
spawn_zone = { min_x = -40.0, max_x = 40.0, min_y = -40.0, max_y = 40.0 }

# For wanderers: target_zone is ignored (they pick their own random targets)
# For seekers: random targets are placed within this zone
target_zone = { min_x = -20.0, max_x = 20.0, min_y = -20.0, max_y = 20.0 }