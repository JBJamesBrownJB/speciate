[meta]
name = "L1: Giant (5m) vs Single Mouse (1m) - Opposing Seekers"
description = """
Size domination test: Giant and mouse seek PAST each other.
- Giant (5m, ~4375kg) should NOT perceive mouse (threshold 219kg > mouse 35kg)
- Mouse (1m, ~35kg) SHOULD perceive giant (threshold 1.75kg < giant 4375kg)

Watch: Giant's perception line should NOT appear toward mouse as they pass.
Watch: Mouse's perception line SHOULD appear toward giant.
"""
timeout_seconds = 30

[[assertions]]
type = "ticks_completed"
count = 300

# Giant seeking from left to right (target beyond mouse)
[[spawns]]
type = "single"
tag = "giant"
x = -50.0
y = 0.0
creature_type = "seeker"
target_x = 100.0
target_y = 0.0
body_size = 5.0

# Mouse seeking from right to left (target beyond giant)
[[spawns]]
type = "single"
tag = "mouse"
x = 50.0
y = 0.0
creature_type = "seeker"
target_x = -100.0
target_y = 0.0
body_size = 1.0
