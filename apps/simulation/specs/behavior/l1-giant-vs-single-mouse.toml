[meta]
name = "L1: Giant (5m) vs Single Mouse (1m)"
description = "Visual test: 5m giant should ignore 1m mouse (35kg < 219kg threshold). Watch if giant perception line appears toward mouse."
timeout_seconds = 30

# Giant wanderer at origin
[[spawns]]
type = "single"
tag = "giant"
x = 0.0
y = 0.0
creature_type = "wanderer"
body_size = 5.0

# Single mouse 60m away (different L1 cell)
[[spawns]]
type = "single"
tag = "mouse"
x = 60.0
y = 0.0
creature_type = "catatonic"
body_size = 1.0
