[meta]
name = "L1: Giant (5m) vs Swarm of 6 Mice - Threshold Edge"
description = """
L1 aggregation edge case: 6 mice just BELOW giant's threshold.
- Giant (5m, ~4375kg) threshold = 219kg
- 6 mice = 6 × 35kg = 210kg < 219kg threshold
- Giant should NOT perceive swarm (just below threshold)
- All mice SHOULD perceive giant

Watch: Giant's perception line should NOT appear toward mice.
Watch: All mice perception lines SHOULD appear toward giant.
"""
timeout_seconds = 30

[[assertions]]
type = "ticks_completed"
count = 300

# Giant seeking toward swarm
[[spawns]]
type = "single"
tag = "giant"
x = -50.0
y = 0.0
creature_type = "seeker"
target_x = 100.0
target_y = 0.0
body_size = 5.0

# 6 mice clustered, seeking away from giant
[[spawns]]
type = "single"
tag = "mouse1"
x = 50.0
y = -3.0
creature_type = "seeker"
target_x = -100.0
target_y = -3.0
body_size = 1.0

