[meta]
name = "L1: Giant (5m) vs Swarm of 7 Mice - Above Threshold"
description = """
L1 aggregation: 7 mice just ABOVE giant's threshold.
- Giant (5m, ~4375kg) threshold = 219kg
- 7 mice = 7 × 35kg = 245kg > 219kg threshold
- Giant SHOULD perceive swarm (above threshold)
- All mice SHOULD perceive giant

Watch: Giant's perception line SHOULD appear toward mice swarm.
Watch: All mice perception lines SHOULD appear toward giant.
Press G to show L1 grid.
"""
timeout_seconds = 30

[[assertions]]
type = "ticks_completed"
count = 300

# Giant seeking toward swarm
[[spawns]]
type = "single"
tag = "giant"
x = -50.0
y = 0.0
creature_type = "seeker"
target_x = 100.0
target_y = 0.0
body_size = 5.0

# 7 mice clustered, seeking away from giant
[[spawns]]
type = "single"
tag = "mouse1"
x = 50.0
y = -3.0
creature_type = "seeker"
target_x = -100.0
target_y = -3.0
