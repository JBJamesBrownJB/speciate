[meta]
name = "L1: Giant (5m) vs Swarm of 7 Mice"
description = "Visual test: 7 mice = 245kg > 219kg threshold. Giant SHOULD see and avoid swarm. Press G to show L1 grid."
timeout_seconds = 30

# Giant wanderer at origin, facing right
[[spawns]]
type = "single"
tag = "giant"
x = 0.0
y = 0.0
creature_type = "wanderer"
body_size = 5.0

# 7 mice clustered in a single L1 cell (total mass = 7 x 35kg = 245kg > 219kg threshold)
