[meta]
name = "L1: Medium (3m) vs Two Mice (1m each) - L1 Aggregation"
description = """
L1 aggregation test: Medium seeks toward clustered mice.
- Medium (3m, ~945kg) threshold = 47kg
- Single mouse (35kg) < threshold, BUT two mice (70kg) > threshold
- Medium SHOULD perceive the cluster (L1 aggregates mass)

Watch: Medium's perception line should appear toward the mice cluster.
"""
timeout_seconds = 30

[[assertions]]
type = "ticks_completed"
count = 300

# Medium (3m) seeking toward mice cluster
[[spawns]]
type = "single"
tag = "medium"
x = -50.0
y = 0.0
creature_type = "seeker"
target_x = 100.0
target_y = 0.0
body_size = 3.0

# Two 1m mice clustered, seeking away from medium
[[spawns]]
type = "single"
tag = "mouse1"
x = 50.0
y = -2.0
creature_type = "seeker"
target_x = -100.0
target_y = -2.0
body_size = 1.0

[[spawns]]
type = "single"
tag = "mouse2"
x = 50.0
y = 2.0
creature_type = "seeker"
target_x = -100.0
target_y = 2.0
body_size = 1.0
