<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speciate WebSocket Test Client</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4ec9b0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .connected {
            background: #0e6a0e;
            color: #90ee90;
        }
        .disconnected {
            background: #6a0e0e;
            color: #ff6b6b;
        }
        .data {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 4px solid #4ec9b0;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
        .label {
            color: #9cdcfe;
            font-weight: bold;
        }
        .value {
            color: #ce9178;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #1177bb;
        }
        #log {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-entry {
            margin: 2px 0;
            color: #858585;
        }
    </style>
</head>
<body>
    <h1>🌱 Speciate WebSocket Test Client</h1>

    <div id="status" class="status disconnected">⚫ Disconnected</div>

    <div class="data">
        <h3>Simulation State</h3>
        <div class="data-row">
            <span class="label">Tick:</span>
            <span class="value" id="tick">-</span>
        </div>
        <div class="data-row">
            <span class="label">Position X:</span>
            <span class="value" id="posX">-</span>
        </div>
        <div class="data-row">
            <span class="label">Position Y:</span>
            <span class="value" id="posY">-</span>
        </div>
        <div class="data-row">
            <span class="label">Position Z:</span>
            <span class="value" id="posZ">-</span>
        </div>
        <div class="data-row">
            <span class="label">Server Time:</span>
            <span class="value" id="serverTime">-</span>
        </div>
        <div class="data-row">
            <span class="label">Messages Received:</span>
            <span class="value" id="msgCount">0</span>
        </div>
    </div>

    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>

    <h3>Event Log</h3>
    <div id="log"></div>

    <script>
        let ws = null;
        let messageCount = 0;

        function log(message) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.textContent = '🟢 Connected';
                statusDiv.className = 'status connected';
            } else {
                statusDiv.textContent = '⚫ Disconnected';
                statusDiv.className = 'status disconnected';
            }
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                log('Already connected');
                return;
            }

            log('Connecting to ws://localhost:8080/ws...');
            ws = new WebSocket('ws://localhost:8080/ws');

            ws.onopen = () => {
                log('✅ WebSocket connected!');
                updateStatus(true);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    messageCount++;

                    document.getElementById('tick').textContent = data.tick;
                    document.getElementById('posX').textContent = data.entity.x.toFixed(2);
                    document.getElementById('posY').textContent = data.entity.y.toFixed(2);
                    document.getElementById('posZ').textContent = data.entity.z.toFixed(2);
                    document.getElementById('serverTime').textContent = new Date(data.server_time).toLocaleTimeString();
                    document.getElementById('msgCount').textContent = messageCount;

                    if (messageCount % 10 === 0) {
                        log(`Received ${messageCount} messages (Tick: ${data.tick})`);
                    }
                } catch (e) {
                    log(`❌ Error parsing message: ${e.message}`);
                }
            };

            ws.onerror = (error) => {
                log(`❌ WebSocket error: ${error}`);
            };

            ws.onclose = () => {
                log('WebSocket closed');
                updateStatus(false);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                log('Disconnected');
            }
        }

        // Auto-connect on page load
        window.addEventListener('load', () => {
            log('Test client loaded');
            connect();
        });
    </script>
</body>
</html>
