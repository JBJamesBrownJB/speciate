services:
  # NATS Message Broker
  nats:
    image: nats:latest
    container_name: speciate-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # Monitoring HTTP endpoint
      - "9224:9224"  # WebSocket connections (LOCAL DEV ONLY)
    volumes:
      - /home/dev/dev/speciate/infrastructure/local/nats-server.conf:/etc/nats/nats-server.conf:ro
    command:
      - "--config=/etc/nats/nats-server.conf"
    networks:
      - speciate-local
    # Note: Healthcheck disabled - NATS container doesn't include wget/curl
    # Monitor via: docker compose ps && curl http://localhost:8222/varz

networks:
  speciate-local:
    name: speciate-local
    driver: bridge
