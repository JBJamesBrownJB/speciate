# NATS Server Configuration for Local Development
# Enables WebSocket support for admin-dev-ui

server_name: speciate-nats

# Standard TCP client connections
port: 4222

# HTTP monitoring endpoint
http_port: 8222

# WebSocket configuration (required for browser-based admin UI)
websocket {
  # WebSocket port (separate from TCP for clarity)
  port: 9224

  # Disable TLS for local development
  # WARNING: NEVER use no_tls in production!
  no_tls: true

  # Enable compression for better bandwidth
  compression: true
}
